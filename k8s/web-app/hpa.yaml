apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: cloudmart-hpa

spec:

  minReplicas: 2
  maxReplicas: 8

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudmart-platform

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 65