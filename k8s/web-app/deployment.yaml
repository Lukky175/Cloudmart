apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloudmart-platform

  labels:
    app: cloudmart-platform

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: cloudmart-platform

  template:

    metadata:
      labels:
        app: cloudmart-platform

    spec:

      containers:
        - name: cloudmart-container

          image: 306649849400.dkr.ecr.ap-south-1.amazonaws.com/cloudmart-app:3e3325390a395c410bdab255cbd99f3cfe22bca0

          ports:
            - containerPort: 3000

          envFrom:
            - secretRef:
                name: cloudmart-secrets

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000

            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000

            initialDelaySeconds: 30
            periodSeconds: 20

          resources:

            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 500m
              memory: 512Mi