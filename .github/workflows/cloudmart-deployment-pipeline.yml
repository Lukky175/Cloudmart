name: CloudMart CI/CD Deployment Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cloudmart-app

permissions:
  contents: write
  id-token: write

jobs:

  container-deployment:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4

        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Amazon ECR Repository

        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Authenticate Docker With Amazon ECR

        id: ecr-login

        uses: aws-actions/amazon-ecr-login@v2

      - name: Build And Push Docker Image

        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}

        run: |

          docker build \
          -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $REGISTRY/$ECR_REPOSITORY:latest .

          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Kubernetes Deployment Manifest

        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}

        run: |

          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          sed -i "s|image: .*|image: $IMAGE_URI|" k8s/web-app/deployment.yaml

          if git diff --quiet -- k8s/web-app/deployment.yaml; then
            echo "Deployment manifest already updated"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/web-app/deployment.yaml

          git commit -m "Update CloudMart image tag to $IMAGE_TAG [skip ci]"

          git push

      - name: Deployment Summary

        run: |

          echo "CloudMart deployment completed successfully"

          echo "Docker Image:"
          echo "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"